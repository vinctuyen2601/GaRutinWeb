<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 44" height="44" role="img" aria-label="GaRutin Logo">
  <!-- Icon background -->
  <rect width="44" height="44" rx="9" fill="#16a34a"/>

  <!-- Quail silhouette in white -->
  <!-- Body -->
  <ellipse cx="20" cy="31" rx="13" ry="9" fill="white"/>
  <!-- Neck bridge -->
  <ellipse cx="27" cy="25" rx="5" ry="5" fill="white"/>
  <!-- Head -->
  <circle cx="30" cy="18" r="7" fill="white"/>
  <!-- Crest / topknot — quail's distinctive forward-drooping plume -->
  <path d="M30 11 C33 6 38 4 37 2 C36 5 32 8 30 11Z" fill="white"/>
  <!-- Beak -->
  <path d="M37 17 L43 19 L37 22Z" fill="white"/>
  <!-- Tail feathers -->
  <path d="M7 29 C1 23 2 16 7 14 C7 20 9 24 11 27Z" fill="white"/>
  <!-- Eye -->
  <circle cx="32" cy="16" r="1.5" fill="#16a34a"/>

  <!-- Brand name -->
  <text x="52" y="28" font-family="'Arial Black', Arial, Helvetica, sans-serif" font-size="21" font-weight="900" fill="#166534">Ga</text>
  <text x="76" y="28" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="600" fill="#16a34a">Rutin</text>

  <!-- Tagline -->
  <text x="52" y="40" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#4ade80" letter-spacing="1.2">TRANG TRẠI GÀ RUTIN</text>
</svg>
